<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>EE 選品報告</title>
<style>
:root {
  --bg: #f5f5f0;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #6b7280;
  --border: #e8e8e2;
  --accent: #e8785e;
  --green: #10b981;
  --red: #ef4444;
  --navy: #1a1a2e;
  --r: 14px;
  --sh: 0 1px 3px rgba(0,0,0,.05), 0 4px 12px rgba(0,0,0,.07);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: var(--bg); color: var(--text);
  line-height: 1.6; -webkit-font-smoothing: antialiased;
  padding-bottom: 32px;
}

/* ── Header ── */
.hdr {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
  padding: 12px 16px 10px;
  position: sticky; top: 0; z-index: 100;
}
.hdr-top { display: flex; align-items: center; }
.hdr-logo { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
.hdr-logo em { color: var(--accent); font-style: normal; }
.hdr-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.hdr-updated { font-size: 11px; color: rgba(255,255,255,.45); }
.top10-btn {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; font-weight: 600; color: rgba(255,255,255,.8);
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  border-radius: 100px; padding: 3px 10px;
  cursor: pointer; transition: background .15s; white-space: nowrap;
}
.top10-btn:hover { background: rgba(255,255,255,.2); }

.hdr-stats { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; align-items: center; }
.stat-mode-btn {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 100px; border: 1px solid rgba(255,255,255,.25);
  background: transparent; color: rgba(255,255,255,.5);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.stat-mode-btn.active {
  background: rgba(255,255,255,.18); color: #fff;
  border-color: rgba(255,255,255,.4);
}
.hdr-stat { font-size: 11px; color: rgba(255,255,255,.75); background: rgba(255,255,255,.1); border-radius: 100px; padding: 2px 9px; }
.hdr-notion { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: rgba(255,255,255,.45); text-decoration: none; margin-top: 6px; }
.hdr-notion:hover { color: rgba(255,255,255,.8); }

/* ── Date nav with right-side fade ── */
.date-nav-wrapper {
  position: sticky; top: 72px; z-index: 90;
}
.date-nav-wrapper::after {
  content: '';
  position: absolute; right: 0; top: 0; bottom: 1px;
  width: 48px;
  background: linear-gradient(to right, transparent, #fff);
  pointer-events: none;
  z-index: 1;
}
.date-nav {
  display: flex; background: #fff;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.date-nav::-webkit-scrollbar { display: none; }
.week-sep {
  display: flex; align-items: center;
  font-size: 10px; font-weight: 600; color: var(--muted);
  padding: 0 6px 0 10px; white-space: nowrap; flex-shrink: 0;
  letter-spacing: .3px;
}
.week-sep::after {
  content: ''; display: block; width: 1px; height: 14px;
  background: var(--border); margin-left: 6px;
}
.date-tab {
  flex: none; padding: 9px 14px;
  font-size: 13px; font-weight: 500; color: var(--muted);
  border: none; background: transparent; cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.date-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.tab-badge {
  display: inline-block; font-size: 10px; background: #f3f4f6; color: var(--muted);
  border-radius: 100px; padding: 1px 6px; margin-left: 4px;
}
.date-tab.active .tab-badge { background: #fff1ee; color: var(--accent); }

/* ── Search bar ── */
.search-wrap {
  position: relative; padding: 8px 12px;
  background: #fff; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.search-inner {
  position: relative; flex: 1;
}
.search-input {
  width: 100%; padding: 8px 32px 8px 34px;
  border: 1px solid var(--border); border-radius: 100px;
  font-size: 13px; color: var(--text);
  background: #f9f9f7;
  outline: none; transition: border-color .15s;
  -webkit-appearance: none;
}
.search-input:focus { border-color: var(--accent); background: #fff; }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  font-size: 14px; pointer-events: none; opacity: .5;
}
.search-clear {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  border: none; background: none; color: var(--muted);
  font-size: 15px; cursor: pointer; padding: 2px 4px;
  display: flex; align-items: center; line-height: 1;
}
.search-btn {
  flex-shrink: 0;
  padding: 7px 14px; border-radius: 100px;
  border: none; background: var(--accent); color: #fff;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background .15s; white-space: nowrap;
}
.search-btn:active { background: #d4644a; }

/* ── Category filter chips — GLOBAL cross-day ── */
.cat-filter-wrap {
  display: flex; gap: 6px; padding: 8px 12px 8px;
  overflow-x: auto; scrollbar-width: none;
  background: #fff; border-bottom: 1px solid var(--border);
}
.cat-filter-wrap::-webkit-scrollbar { display: none; }
.cat-filter-label {
  flex-shrink: 0; font-size: 11px; color: var(--muted);
  display: flex; align-items: center; padding-right: 2px;
  white-space: nowrap;
}
.cat-chip {
  flex-shrink: 0; padding: 4px 12px; border-radius: 100px;
  font-size: 12px; font-weight: 500;
  border: 1.5px solid var(--border); background: #fff; color: var(--muted);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.cat-chip.active { background: #ede9fe; border-color: #7c3aed; color: #7c3aed; }

/* Cross-date result date label */
.card-date-label { font-size: 10px; color: var(--muted); padding: 4px 14px 0; letter-spacing: .2px; }

/* ── Evolution banner ── */
.evo {
  margin: 10px 12px 0;
  background: #fffbeb; border-radius: 10px;
  padding: 9px 13px; border-left: 3px solid #f59e0b;
}
.evo-label { font-size: 10px; font-weight: 700; color: #d97706; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 2px; }
.evo-text { font-size: 13px; color: #78350f; line-height: 1.55; }

/* ── Section header ── */
.sec-hdr { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: .4px; text-transform: uppercase; padding: 14px 16px 6px; }

/* ── Product card ── */
.card {
  background: var(--card); margin: 8px 12px;
  border-radius: var(--r); box-shadow: var(--sh);
  overflow: hidden; border: 1.5px solid transparent;
  transition: border-color .2s;
}
.card.v-up   { border-color: #10b981; }
.card.v-down { border-color: #ef4444; }

.card-top { display: flex; align-items: center; gap: 10px; padding: 12px 14px 0; }
.rank-num {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  background: #f3f4f6; color: var(--muted);
}
.rank-num.r1 { background: #fef3c7; color: #d97706; }
.rank-num.r2 { background: #f1f5f9; color: #475569; }
.rank-num.r3 { background: #fce7f3; color: #be185d; }
.card-name { flex: 1; font-size: 16px; font-weight: 600; line-height: 1.3; }
.voted-badge { font-size: 14px; flex-shrink: 0; }
.score-ring {
  width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
  border: 2.5px solid; display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700;
}
.s-hi { background: #ecfdf5; color: #059669; border-color: #059669; }
.s-md { background: #fffbeb; color: #d97706; border-color: #d97706; }
.s-lo { background: #fef2f2; color: #dc2626; border-color: #dc2626; }

.card-tags { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 14px 0; }
.tag { padding: 2px 9px; border-radius: 100px; font-size: 11px; font-weight: 500; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: middle; }
.t-cat { background: #ede9fe; color: #7c3aed; }
.t-src { background: #dbeafe; color: #1d4ed8; }
.t-mg  { background: #d1fae5; color: #065f46; }

.card-hl { padding: 8px 14px 0; font-size: 13px; color: var(--muted); line-height: 1.6; }

/* ── Mini dimension bars (collapsed state preview) ── */
.mini-scores {
  display: flex; gap: 3px; padding: 8px 14px 2px;
}
.mini-s { flex: 1; }
.mini-track { height: 4px; background: #f0f0ee; border-radius: 2px; overflow: hidden; }
.mini-fill { height: 100%; border-radius: 2px; transition: width 0.6s cubic-bezier(.4,0,.2,1); min-width: 3px; }

/* ── Card metrics ── */
.card-nums { display: flex; border-top: 1px solid var(--border); margin-top: 8px; }
.cn { flex: 1; text-align: center; padding: 9px 4px; }
.cn + .cn { border-left: 1px solid var(--border); }
.cn-label { font-size: 10px; color: var(--muted); }
.cn-val { font-size: 14px; font-weight: 600; margin-top: 1px; }
.cn-val.g { color: #059669; }

/* ── Expand button ── */
.exp-btn {
  width: 100%; padding: 9px; border: none; background: transparent;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  font-size: 12px; color: var(--muted); cursor: pointer;
  border-top: 1px solid var(--border);
  transition: background .15s;
}
.exp-btn:hover { background: #fafafa; }
.exp-btn .arr { transition: transform .3s; display: inline-flex; }
.exp-btn.open .arr { transform: rotate(180deg); }

/* ── Detail panel (JS sets max-height for smooth animation) ── */
.det { max-height: 0; overflow: hidden; transition: max-height .4s cubic-bezier(.4,0,.2,1); }
.det-inner { padding: 14px 14px 4px; border-top: 1px solid var(--border); }
.scores-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 10px;
}
.scores-title { font-size: 12px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: .4px; }
.scores-note  { font-size: 10px; color: var(--muted); }
.sb { display: grid; grid-template-columns: 58px 1fr 44px; gap: 3px 8px; align-items: center; margin-bottom: 5px; }
.sb-lbl { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-track { height: 6px; background: #f3f4f6; border-radius: 3px; overflow: hidden; }
.sb-fill  { height: 100%; border-radius: 3px; transition: width .7s cubic-bezier(.4,0,.2,1); }
.sb-right { text-align: right; }
.sb-score  { font-size: 11px; font-weight: 700; line-height: 1.2; }
.sb-wt     { font-size: 9px; color: var(--muted); line-height: 1.2; }

/* Detail sections */
.ds-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 14px; }
@media (min-width: 560px) { .ds-grid { grid-template-columns: 1fr 1fr; } }
.ds { background: #f9f9f7; border-radius: 9px; padding: 10px 12px; }
.ds-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.ds-body  { font-size: 12px; color: #4b5563; line-height: 1.7; }

/* Action row (links + vote merged) */
.action-row { display: flex; align-items: center; gap: 6px 8px; padding: 8px 12px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.action-links { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; min-width: 160px; }
.link-chip {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 4px 10px; border-radius: 100px;
  background: #f3f4f6; color: #374151;
  font-size: 12px; font-weight: 500; text-decoration: none;
  white-space: nowrap; transition: background .15s;
}
.link-chip:hover { background: #e5e7eb; }
.action-vote { display: flex; gap: 6px; flex-shrink: 0; }
.vbtn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 14px; border-radius: 100px;
  border: 1.5px solid var(--border); background: #fff;
  font-size: 13px; font-weight: 500; color: var(--muted);
  cursor: pointer; transition: all .18s;
}
.vbtn:hover { border-color: #9ca3af; color: var(--text); }
.vbtn.v-up   { background: #ecfdf5; border-color: #10b981; color: #059669; }
.vbtn.v-down { background: #fef2f2; border-color: #f87171; color: #dc2626; }

/* No results */
.no-results { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 14px; }
.no-results em { display: block; font-size: 28px; font-style: normal; margin-bottom: 8px; }

/* Top 10 */
.top10 { margin: 8px 12px 4px; background: var(--card); border-radius: var(--r); box-shadow: var(--sh); overflow: hidden; }
.top10-hdr { padding: 11px 14px 9px; font-size: 13px; font-weight: 700; border-bottom: 1px solid var(--border); color: var(--text); }
.top10-row {
  display: flex; align-items: center; gap: 10px; padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .15s; text-decoration: none; color: inherit;
}
.top10-row:hover { background: #f9f9f7; }
.top10-row:last-child { border-bottom: none; }
.top10-arrow { font-size: 11px; color: #d1d5db; }
.top10-rank { width: 22px; font-size: 13px; font-weight: 700; color: var(--muted); text-align: center; flex-shrink: 0; }
.top10-name { flex: 1; font-size: 13px; font-weight: 500; }
.top10-date { font-size: 11px; color: var(--muted); white-space: nowrap; }
.top10-score { font-size: 15px; font-weight: 700; width: 30px; text-align: right; flex-shrink: 0; }

/* Loading */
.loading { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 14px; }
.spin { width: 32px; height: 32px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #1f2936; color: #fff; padding: 10px 22px;
  border-radius: 100px; font-size: 13px; font-weight: 500;
  z-index: 999; opacity: 0; transition: all .25s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (min-width: 640px) {
  body { max-width: 580px; margin: 0 auto; }
}
</style>

// ──────────────────────────────────────────
//  CARD HTML
// ──────────────────────────────────────────
function cardHTML(p, i, dateOverride, showDate) {
  const date  = dateOverride || G.date;
  const key   = `${date}-${p.rank}`;
  const dims  = getDims(p.scores);
  const myV   = G.votes[key];
  const links = Array.isArray(p.links) ? p.links : Object.values(p.links || {});

  // Mini dimension bars (collapsed-state preview)
  const miniScores = `<div class="mini-scores">
    ${dims.map(d => {
      const raw = p.scores[d.key] ?? 0;
      return `<div class="mini-s" title="${d.label}: ${raw}"><div class="mini-track"><div class="mini-fill" style="width:${raw}%;background:${d.c}"></div></div></div>`;
    }).join('')}
  </div>`;

  // Full score bars (in expanded detail)
  const scoreBars = dims.map(d => {
    const raw = p.scores[d.key] ?? 0;
    return `<div class="sb">
      <div class="sb-lbl">${d.label}</div>
      <div class="sb-track"><div class="sb-fill" style="width:${raw}%;background:${d.c}"></div></div>
      <div class="sb-right"><div class="sb-score">${raw}</div><div class="sb-wt">${d.w}%</div></div>
    </div>`;
  }).join('');

  const sections = SECTIONS.filter(s => p[s.key]).map(s => `
    <div class="ds">
      <div class="ds-title">${s.label}</div>
      <div class="ds-body">${e(p[s.key]).replace(/\n/g,'<br>')}</div>
    </div>`).join('');

  const actionRow = `
    <div class="action-row">
      <div class="action-links">
        ${links.map(url => { const pl = platform(url); return `<a class="link-chip" href="${e(url)}" target="_blank" rel="noopener">${pl.icon} ${pl.name}</a>`; }).join('')}
      </div>
      <div class="action-vote">
        <button class="vbtn${myV==='up'?' v-up':''}" id="vup-${key}" onclick="vote('${key}','up')">👍 值得</button>
        <button class="vbtn${myV==='down'?' v-down':''}" id="vdn-${key}" onclick="vote('${key}','down')">👎 跳過</button>
      </div>
    </div>`;

  const dateLabelHtml = showDate ? `<div class="card-date-label">📅 ${date}</div>` : '';

  return `
    <div class="card${myV?' v-'+myV:''}" id="card-${key}" data-cat="${e(p.category||'')}">
      ${dateLabelHtml}<div class="card-top">
        <div class="rank-num${i<3?' r'+(i+1):''}">${i+1}</div>
        <div class="card-name">${e(p.name)}</div>
        ${myV ? `<div class="voted-badge">${myV==='up'?'👍':'👎'}</div>` : ''}
        <div class="score-ring ${sc(p.score)}">${p.score}</div>
      </div>

      <div class="card-tags">
        <span class="tag t-cat">${e(p.category)}</span>
        <span class="tag t-src">${e(p.source)}</span>
        <span class="tag t-mg">毛利 ${e(p.margin)}</span>
      </div>

      ${p.highlight ? `<div class="card-hl">${e(p.highlight)}</div>` : ''}

      ${miniScores}

      <div class="card-nums">
        <div class="cn"><div class="cn-label">建議售價</div><div class="cn-val">${e(p.price)}</div></div>
        <div class="cn"><div class="cn-label">毛利倍數</div><div class="cn-val g">${e(p.margin)}</div></div>
      </div>

      ${actionRow}

      <button class="exp-btn" id="expbtn-${key}" onclick="toggleDet('${key}')">
        展開詳情 <span class="arr">▾</span>
      </button>

      <div class="det" id="det-${key}">
        <div class="det-inner">
          <div class="scores-head">
            <span class="scores-title">${dims.length} 維度評分</span>
            <span class="scores-note">原始分 0–100，括號為權重</span>
          </div>
          ${scoreBars}
          ${sections ? `<div class="ds-grid">${sections}</div>` : ''}
        </div>
      </div>
    </div>`;
}

// ──────────────────────────────────────────
//  ACTIONS
// ──────────────────────────────────────────
function switchDate(d) {
  G.date = d;
  G.searchQuery = '';
  G.catFilter   = '';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function jumpToProduct(date, rank) {
  G.date = date;
  G.searchQuery = '';
  G.catFilter = '';
  render();
  const key = `${date}-${rank}`;
  setTimeout(() => {
    const card = document.getElementById('card-' + key);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      const det = document.getElementById('det-' + key);
      if (det && !det.classList.contains('open')) {
        setTimeout(() => toggleDet(key), 300);
      }
    }
  }, 80);
}

function jumpToTop10() {
  const el = document.getElementById('top10-section');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Smooth expand/collapse using actual scrollHeight
function toggleDet(key) {
  const det = document.getElementById('det-'+key);
  const btn = document.getElementById('expbtn-'+key);
  if (!det.classList.contains('open')) {
    det.style.maxHeight = det.scrollHeight + 'px';
    det.classList.add('open');
    btn.classList.add('open');
    btn.innerHTML = '收起詳情 <span class="arr">▾</span>';
  } else {
    det.style.maxHeight = '0';
    det.classList.remove('open');
    btn.classList.remove('open');
    btn.innerHTML = '展開詳情 <span class="arr">▾</span>';
  }
}

function setStatsMode(mode) {
  G.statsMode = mode;
  render();
}

// ── FIX 3: Search button / Enter triggered only ──
let _pendingSearch = false;

function triggerSearch() {
  const inp = document.getElementById('search-input');
  if (inp) onSearch(inp.value);
  _pendingSearch = false;
}

function clearSearch() {
  const inp = document.getElementById('search-input');
  if (inp) inp.value = '';
  onSearch('');
}

function onSearch(q) {
  G.searchQuery = q;
  const clr = document.getElementById('search-clear');
  if (clr) clr.style.display = q ? 'flex' : 'none';
  renderProductList();
}

function setCategory(cat) {
  G.catFilter = (cat === '全部') ? '' : cat;
  // Reset search when switching category
  const inp = document.getElementById('search-input');
  if (inp && G.catFilter) { inp.value = ''; G.searchQuery = ''; }
  renderProductList();
}

// ── FIX 2 + FIX 1: renderProductList ──
function renderProductList() {
  if (!G.data) return;
  const lq = G.searchQuery.toLowerCase().trim();
  const cf = G.catFilter;
  const today = todayStr();

  // All valid products across all past/today dates (for category chips + global mode)
  const allValidProducts = [];
  G.data.reports.filter(r => r.date <= today).forEach(r => {
    r.products.forEach(p => { allValidProducts.push({...p, _date: r.date}); });
  });

  // ── FIX 2: Category chips always come from ALL valid products ──
  const cats = [...new Set(allValidProducts.map(p => p.category).filter(Boolean))].sort();
  const catFiltersEl = document.getElementById('cat-filters');
  if (catFiltersEl) {
    catFiltersEl.innerHTML =
      `<span class="cat-filter-label">分類：</span>` +
      ['全部', ...cats].map(c => {
        const isActive = (c === '全部' && !cf) || c === cf;
        return `<button class="cat-chip${isActive?' active':''}" onclick="setCategory('${e(c)}')">${e(c)}</button>`;
      }).join('');
  }

  // ── FIX 2: Category filter → global mode (spans all dates) ──
  const isGlobalMode = lq.length > 0 || cf.length > 0;

  // Build candidate pool
  let pool = [];
  if (isGlobalMode) {
    pool = allValidProducts;
  } else {
    const validReports = G.data.reports.filter(r => r.date <= today);
    const report = validReports.find(r => r.date === G.date) || validReports[0];
    (report?.products || []).forEach(p => { pool.push({...p, _date: G.date}); });
  }

  // Apply search + category filters
  let results = pool.filter(p => {
    const text = [p.name, p.category, p.highlight||'', p.source||''].join(' ').toLowerCase();
    const matchSearch = !lq || text.includes(lq);
    const matchCat    = !cf  || p.category === cf;
    return matchSearch && matchCat;
  });

  // Render product list
  const listEl = document.getElementById('product-list');
  if (!listEl) return;

  if (results.length === 0) {
    listEl.innerHTML = '<div class="no-results"><em>🔍</em>沒有符合條件的產品</div>';
  } else if (isGlobalMode) {
    // Group by date (newest first)
    const byDate = {};
    results.forEach(p => { (byDate[p._date] = byDate[p._date] || []).push(p); });
    let html = '';
    Object.entries(byDate).sort((a,b) => b[0].localeCompare(a[0])).forEach(([date, prods]) => {
      html += `<div class="sec-hdr">${date}（${prods.length} 件）</div>`;
      prods.forEach((p, i) => { html += cardHTML(p, i, date, true); });
    });
    listEl.innerHTML = html;
  } else {
    listEl.innerHTML = results.map((p, i) => cardHTML(p, i, G.date, false)).join('');
  }

  // Restore vote visual state
  Object.entries(G.votes).forEach(([k, v]) => {
    document.getElementById('card-'+k)?.classList.add('v-'+v);
    document.getElementById('vup-'+k)?.classList.toggle('v-up',   v==='up');
    document.getElementById('vdn-'+k)?.classList.toggle('v-down', v==='down');
  });

  // Update section header
  const hdr = document.getElementById('sec-hdr-main');
  if (hdr) {
    const total = results.length;
    const dates = new Set(results.map(p => p._date));
    if (lq) {
      hdr.textContent = `🔍 搜尋「${G.searchQuery}」— ${total} 件${dates.size > 1 ? `（跨 ${dates.size} 天）` : ''}`;
    } else if (cf) {
      hdr.textContent = `🏷 ${cf} — ${total} 件（跨 ${dates.size} 天）`;
    } else {
      const dayTotal = G.data.reports.find(r => r.date === G.date)?.products.length || 0;
      hdr.textContent = `📊 ${G.date} 精選（${dayTotal} 件）`;
    }
  }
}

function vote(key, type) {
  const prev  = G.votes[key];
  const card  = document.getElementById('card-'+key);
  const upBtn = document.getElementById('vup-'+key);
  const dnBtn = document.getElementById('vdn-'+key);

  // Toggle off if same button tapped twice
  if (prev === type) {
    delete G.votes[key];
    saveVotes();
    card?.classList.remove('v-up','v-down');
    upBtn?.classList.remove('v-up');
    dnBtn?.classList.remove('v-down');
    card?.querySelector('.voted-badge')?.remove();
    return;
  }

  G.votes[key] = type;
  saveVotes();
  card?.classList.remove('v-up','v-down');
  card?.classList.add('v-'+type);
  upBtn?.classList.toggle('v-up',   type==='up');
  upBtn?.classList.toggle('v-down', false);
  dnBtn?.classList.toggle('v-down', type==='down');
  dnBtn?.classList.toggle('v-up',   false);

  // Update or insert voted badge
  const cardTop = card?.querySelector('.card-top');
  let badge = card?.querySelector('.voted-badge');
  if (!badge && cardTop) {
    badge = document.createElement('div');
    badge.className = 'voted-badge';
    const ring = cardTop.querySelector('.score-ring');
    if (ring) cardTop.insertBefore(badge, ring);
    else cardTop.appendChild(badge);
  }
  if (badge) badge.textContent = type==='up' ? '👍' : '👎';

  const p = G.pMap[key];
  if (p) {
    fetch(FEEDBACK_API, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        report_date:   G.date,
        product_name:  p.name,
        product_score: p.score,
        feedback:      type==='up' ? '👍' : '👎',
        reviewer:      'EE_member'
      })
    }).catch(() => {});
  }
  showToast(type === 'up' ? '👍 已記錄！' : '👎 已記錄！');
}

// ──────────────────────────────────────────
//  BOOT
// ──────────────────────────────────────────
loadVotes();
fetch(DATA_URL + '?v=' + Date.now())
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => {
    G.data = data;
    // FIX 1: Start on most recent non-future date
    const today = todayStr();
    const validReports = data.reports.filter(r => r.date <= today).sort((a,b) => b.date.localeCompare(a.date));
    G.date = validReports[0]?.date || data.reports.sort((a,b) => b.date.localeCompare(a.date))[0]?.date || '';
    render();
  })
  .catch(err => {
    document.getElementById('app').innerHTML =
      `<div class="loading" style="color:#ef4444">
        ⚠️ 報告載入失敗，請重整頁面<br>
        <small style="font-size:11px;opacity:.6">${err.message}</small>
      </div>`;
  });
</script>
