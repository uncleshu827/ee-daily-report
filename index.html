<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>EE 選品報告</title>
<style>
:root {
  --bg: #f5f5f0;
  --card: #ffffff;
  --text: #1a1a1a;
  --muted: #6b7280;
  --border: #e8e8e2;
  --accent: #e8785e;
  --green: #10b981;
  --red: #ef4444;
  --navy: #1a1a2e;
  --r: 14px;
  --sh: 0 1px 3px rgba(0,0,0,.05), 0 4px 12px rgba(0,0,0,.07);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: var(--bg); color: var(--text);
  line-height: 1.6; -webkit-font-smoothing: antialiased;
  padding-bottom: 32px;
}

/* ─ Header ─ */
.hdr {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
  padding: 12px 16px 10px;
  position: sticky; top: 0; z-index: 100;
}
.hdr-top { display: flex; align-items: center; }
.hdr-logo { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
.hdr-logo em { color: var(--accent); font-style: normal; }
.hdr-updated { font-size: 11px; color: rgba(255,255,255,.45); margin-left: auto; }
.hdr-stats { display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
.hdr-stat { font-size: 11px; color: rgba(255,255,255,.75); background: rgba(255,255,255,.1); border-radius: 100px; padding: 2px 9px; }
.hdr-notion { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: rgba(255,255,255,.45); text-decoration: none; margin-top: 6px; }
.hdr-notion:hover { color: rgba(255,255,255,.8); }

/* ─ Date tabs ─ */
.date-nav {
  display: flex; background: #fff;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  position: sticky; top: 72px; z-index: 90;
  scrollbar-width: none;
}
.date-nav::-webkit-scrollbar { display: none; }
.date-tab {
  flex: none; padding: 9px 15px;
  font-size: 13px; font-weight: 500; color: var(--muted);
  border: none; background: transparent; cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.date-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.tab-badge {
  display: inline-block; font-size: 10px; background: #f3f4f6; color: var(--muted);
  border-radius: 100px; padding: 1px 6px; margin-left: 4px;
}
.date-tab.active .tab-badge { background: #fff1ee; color: var(--accent); }

/* ─ Evolution banner ─ */
.evo {
  margin: 10px 12px 0;
  background: #fffbeb; border-radius: 10px;
  padding: 9px 13px; border-left: 3px solid #f59e0b;
}
.evo-label { font-size: 10px; font-weight: 700; color: #d97706; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 2px; }
.evo-text { font-size: 13px; color: #78350f; line-height: 1.55; }

/* ─ Section header ─ */
.sec-hdr { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: .4px; text-transform: uppercase; padding: 14px 16px 6px; }

/* ─ Product card ─ */
.card {
  background: var(--card); margin: 8px 12px;
  border-radius: var(--r); box-shadow: var(--sh);
  overflow: hidden; border: 1.5px solid transparent;
  transition: border-color .2s;
}
.card.v-up   { border-color: #10b981; }
.card.v-down { border-color: #ef4444; }

.card-top { display: flex; align-items: center; gap: 10px; padding: 12px 14px 0; }
.rank-num {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  background: #f3f4f6; color: var(--muted);
}
.rank-num.r1 { background: #fef3c7; color: #d97706; }
.rank-num.r2 { background: #f1f5f9; color: #475569; }
.rank-num.r3 { background: #fce7f3; color: #be185d; }
.card-name { flex: 1; font-size: 16px; font-weight: 600; line-height: 1.3; }
.score-ring {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  border: 2.5px solid; display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700;
}
.s-hi { background: #ecfdf5; color: #059669; border-color: #059669; }
.s-md { background: #fffbeb; color: #d97706; border-color: #d97706; }
.s-lo { background: #fef2f2; color: #dc2626; border-color: #dc2626; }

.card-tags { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 14px 0; }
.tag { padding: 2px 9px; border-radius: 100px; font-size: 11px; font-weight: 500; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: middle; }
.t-cat { background: #ede9fe; color: #7c3aed; }
.t-src { background: #dbeafe; color: #1d4ed8; }
.t-mg  { background: #d1fae5; color: #065f46; }

.card-hl { padding: 8px 14px 0; font-size: 13px; color: var(--muted); line-height: 1.6; }

.card-nums { display: flex; border-top: 1px solid var(--border); margin-top: 10px; }
.cn { flex: 1; text-align: center; padding: 9px 4px; }
.cn + .cn { border-left: 1px solid var(--border); }
.cn-label { font-size: 10px; color: var(--muted); }
.cn-val { font-size: 14px; font-weight: 600; margin-top: 1px; }
.cn-val.g { color: #059669; }

/* ─ Expand button ─ */
.exp-btn {
  width: 100%; padding: 9px; border: none; background: transparent;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  font-size: 12px; color: var(--muted); cursor: pointer;
  border-top: 1px solid var(--border);
  transition: background .15s;
}
.exp-btn:hover { background: #fafafa; }
.exp-btn .arr { transition: transform .3s; display: inline-flex; }
.exp-btn.open .arr { transform: rotate(180deg); }

/* ─ Detail panel ─ */
.det { max-height: 0; overflow: hidden; transition: max-height .45s ease; }
.det.open { max-height: 9999px; }
.det-inner { padding: 14px 14px 4px; border-top: 1px solid var(--border); }

/* Score bars — KEY FIX: raw 0-100 scores */
.scores-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 10px;
}
.scores-title { font-size: 12px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: .4px; }
.scores-note  { font-size: 10px; color: var(--muted); }
.sb { display: grid; grid-template-columns: 58px 1fr 44px; gap: 3px 8px; align-items: center; margin-bottom: 5px; }
.sb-lbl { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-track { height: 6px; background: #f3f4f6; border-radius: 3px; overflow: hidden; }
.sb-fill  { height: 100%; border-radius: 3px; transition: width .7s cubic-bezier(.4,0,.2,1); }
.sb-right { text-align: right; }
.sb-score  { font-size: 11px; font-weight: 700; line-height: 1.2; }
.sb-wt    { font-size: 9px; color: var(--muted); line-height: 1.2; }

/* Detail sections */
.ds-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 14px; }
@media (min-width: 560px) { .ds-grid { grid-template-columns: 1fr 1fr; } }
.ds { background: #f9f9f7; border-radius: 9px; padding: 10px 12px; }
.ds-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.ds-body  { font-size: 12px; color: #4b5563; line-height: 1.7; }

/* Links */
.card-links { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 14px; border-top: 1px solid var(--border); }
.link-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 12px; border-radius: 100px;
  background: #f3f4f6; color: #374151;
  font-size: 12px; font-weight: 500; text-decoration: none;
  transition: background .15s;
}
.link-btn:hover { background: #e5e7eb; }

/* Vote — always visible below metrics */
.vote-row { display: flex; align-items: center; gap: 8px; padding: 9px 14px; border-top: 1px solid var(--border); }
.vote-q { flex: 1; font-size: 12px; color: var(--muted); }
.vbtn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 14px; border-radius: 100px;
  border: 1.5px solid var(--border); background: #fff;
  font-size: 13px; font-weight: 500; color: var(--muted);
  cursor: pointer; transition: all .18s;
}
.vbtn:hover { border-color: #9ca3af; color: var(--text); }
.vbtn.v-up   { background: #ecfdf5; border-color: #10b981; color: #059669; }
.vbtn.v-down { background: #fef2f2; border-color: #f87171; color: #dc2626; }

/* Top 10 */
.top10 { margin: 8px 12px 4px; background: var(--card); border-radius: var(--r); box-shadow: var(--sh); overflow: hidden; }
.top10-hdr { padding: 11px 14px 9px; font-size: 13px; font-weight: 700; border-bottom: 1px solid var(--border); color: var(--text); }
.top10-row {
  display: flex; align-items: center; gap: 10px; padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .15s; text-decoration: none; color: inherit;
}
.top10-row:hover { background: #f9f9f7; }
.top10-row:last-child { border-bottom: none; }
.top10-arrow { font-size: 11px; color: #d1d5db; }
.top10-rank { width: 22px; font-size: 13px; font-weight: 700; color: var(--muted); text-align: center; flex-shrink: 0; }
.top10-name { flex: 1; font-size: 13px; font-weight: 500; }
.top10-date { font-size: 11px; color: var(--muted); white-space: nowrap; }
.top10-score { font-size: 15px; font-weight: 700; width: 28px; text-align: right; flex-shrink: 0; }

/* Loading */
.loading { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 14px; }
.spin { width: 32px; height: 32px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #1f2937; color: #fff; padding: 10px 22px;
  border-radius: 100px; font-size: 13px; font-weight: 500;
  z-index: 999; opacity: 0; transition: all .25s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (min-width: 640px) {
  body { max-width: 580px; margin: 0 auto; }
}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div>載入報告中…</div></div>
<div class="toast" id="toast"></div>

<script>
// ──────────────────────────────────────────
//  CONFIG
// ──────────────────────────────────────────
const DATA_URL    = 'https://raw.githubusercontent.com/uncleshu827/ee-daily-report/main/data.json';
const NOTION_URL  = 'https://www.notion.so/326c45deba0b80dc9660c661b84f6158';
const FEEDBACK_API = 'https://script.google.com/macros/s/AKfycbwZZj_KXEh3Q67nJwW_c5xmYdBVnVoxlSJLYtVfbHRwq0NKxKN9NtKH81pRkAL2Ffxb/exec';

// ──────────────────────────────────────────
//  DIMENSION CONFIGS  (v2.0 = 6 dims, v2.1 = 7 dims)
// ──────────────────────────────────────────
const DIMS7 = [
  { key:'margin',     label:'毛利潛力', w:20, c:'#6366f1' },
  { key:'demand',     label:'需求驗證', w:20, c:'#10b981' },
  { key:'window',     label:'市場窗口', w:14, c:'#f59e0b' },
  { key:'barrier',    label:'競爭壁壘', w:14, c:'#f97316' },
  { key:'viral',      label:'傳播力',   w:14, c:'#ec4899' },
  { key:'difficulty', label:'操作難度', w:9,  c:'#06b6d4' },
  { key:'repurchase', label:'複購LTV',  w:9,  c:'#8b5cf6' },
];
const DIMS6 = [
  { key:'margin',     label:'毛利潛力', w:25, c:'#6366f1' },
  { key:'demand',     label:'需求驗證', w:25, c:'#10b981' },
  { key:'barrier',    label:'競爭壁壘', w:15, c:'#f97316' },
  { key:'viral',      label:'傳播力',   w:15, c:'#ec4899' },
  { key:'difficulty', label:'操作難度', w:10, c:'#06b6d4' },
  { key:'repurchase', label:'複購LTV',  w:10, c:'#8b5cf6' },
];
function getDims(scores) {
  return 'window' in scores ? DIMS7 : DIMS6;
}

// ──────────────────────────────────────────
//  DETAIL SECTIONS
// ──────────────────────────────────────────
const SECTIONS = [
  { key:'source',            label:'📍 來源與定位' },
  { key:'demand_validation', label:'📊 需求驗證'   },
  { key:'cost_breakdown',    label:'💰 成本與利潤' },
  { key:'competition',       label:'⚔️ 競爭分析'  },
  { key:'strategy',          label:'🛒 通路策略'   },
  { key:'risks',             label:'⚠️ 風險認證'  },
  { key:'repurchase_detail', label:'🔄 複購與LTV'  },
];

// ──────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────
let G = { data: null, date: null, votes: {}, pMap: {} };

// ──────────────────────────────────────────
//  HELPERS
// ──────────────────────────────────────────
const sc = s => s >= 75 ? 's-hi' : s >= 60 ? 's-md' : 's-lo';
const e  = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;');

function platform(url) {
  if (!url) return { icon:'🔗', name:'連結' };
  const u = url.toLowerCase();
  if (u.includes('shopee.tw'))             return { icon:'🛍', name:'蝦皮' };
  if (u.includes('momoshop')||u.includes('momo.com')) return { icon:'🛒', name:'momo' };
  if (u.includes('pchome'))                return { icon:'🖥', name:'PChome' };
  if (u.includes('amazon.'))               return { icon:'📦', name:'Amazon' };
  if (u.includes('1688.com'))              return { icon:'🏭', name:'1688' };
  if (u.includes('kickstarter'))           return { icon:'🚀', name:'Kickstarter' };
  if (u.includes('pinkoi'))                return { icon:'🎨', name:'Pinkoi' };
  if (u.includes('makuake'))               return { icon:'🇯🇵', name:'Makuake' };
  if (u.includes('notion.so'))             return { icon:'📔', name:'Notion' };
  return { icon:'🔗', name:'官網' };
}

const DAYS = ['日','一','二','三','四','五','六'];
function fmtTab(s) {
  const d = new Date(s + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()} 週${DAYS[d.getDay()]}`;
}

function showToast(m) {
  const el = document.getElementById('toast');
  el.textContent = m; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ──────────────────────────────────────────
//  RENDER
// ──────────────────────────────────────────
function render() {
  const { data, date } = G;
  if (!data) return;

  const report   = data.reports.find(r => r.date === date) || data.reports[0];
  const products = report?.products || [];

  // Build sorted cross-day top 10
  const all = data.reports.flatMap(r => r.products.map(p => ({...p, _d: r.date})));
  all.sort((a,b) => b.score - a.score);
  const top10 = all.slice(0, 10);

  // Stats
  const avgScore = Math.round(all.reduce((s,p)=>s+p.score,0) / all.length);
  const maxScore = Math.max(...all.map(p=>p.score));

  // Build product map for vote lookups
  G.pMap = {};
  products.forEach(p => { G.pMap[`${date}-${p.rank}`] = p; });

  document.getElementById('app').innerHTML = `
    <div class="hdr">
      <div class="hdr-top">
        <div class="hdr-logo">🛒 <em>EE</em> 選品報告</div>
        <div class="hdr-updated">更新 ${data.lastUpdated}</div>
      </div>
      <div class="hdr-stats">
        <span class="hdr-stat">📅 ${data.reports.length} 天</span>
        <span class="hdr-stat">📦 ${all.length} 選品</span>
        <span class="hdr-stat">⭐ 均分 ${avgScore}</span>
        <span class="hdr-stat">🏆 最高 ${maxScore}</span>
      </div>
      <a class="hdr-notion" href="${NOTION_URL}" target="_blank">📔 Notion 完整報告 →</a>
    </div>

    <div class="date-nav">
      ${[...data.reports].sort((a,b)=>a.date.localeCompare(b.date)).map(r => `
        <button class="date-tab${r.date===date?' active':''}" onclick="switchDate('${r.date}')">
          ${fmtTab(r.date)}<span class="tab-badge">${r.products.length}</span>
        </button>`).join('')}
    </div>

    ${report?.evolution ? `
      <div class="evo">
        <div class="evo-label">🧬 今日進化</div>
        <div class="evo-text">${e(report.evolution)}</div>
      </div>` : ''}

    <div class="sec-hdr">📊 ${date} 精選（${products.length} 件）</div>

    ${products.map((p, i) => cardHTML(p, i)).join('')}

    <div class="sec-hdr">🏆 歷史 Top 10</div>
    <div class="top10">
      <div class="top10-hdr">跨日最高分排行</div>
      ${top10.map((p, i) => `
        <div class="top10-row" onclick="jumpToProduct('${p._d}',${p.rank})" title="跳轉至 ${p._d} ${e(p.name)}">
          <div class="top10-rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
          <div class="top10-name">${e(p.name)}</div>
          <div class="top10-date">${p._d.slice(5)}</div>
          <div class="top10-score ${sc(p.score)}">${p.score}</div>
          <div class="top10-arrow">›</div>
        </div>`).join('')}
    </div>
  `;

  // Restore vote visual state
  Object.entries(G.votes).forEach(([k, v]) => {
    document.getElementById('card-'+k)?.classList.add('v-'+v);
    document.getElementById('vup-'+k)?.classList.toggle('v-up',   v==='up');
    document.getElementById('vdn-'+k)?.classList.toggle('v-down', v==='down');
  });
}

// ──────────────────────────────────────────
//  CARD HTML
// ──────────────────────────────────────────
function cardHTML(p, i) {
  const key  = `${G.date}-${p.rank}`;
  const dims = getDims(p.scores);
  const myV  = G.votes[key];
  const links = Array.isArray(p.links) ? p.links : Object.values(p.links || {});

  const scoreBars = dims.map(d => {
    const raw = p.scores[d.key] ?? 0;
    return `<div class="sb">
      <div class="sb-lbl">${d.label}</div>
      <div class="sb-track"><div class="sb-fill" style="width:${raw}%;background:${d.c}"></div></div>
      <div class="sb-right">
        <div class="sb-score">${raw}</div>
        <div class="sb-wt">${d.w}%</div>
      </div>
    </div>`;
  }).join('');

  const sections = SECTIONS.filter(s => p[s.key]).map(s => `
    <div class="ds">
      <div class="ds-title">${s.label}</div>
      <div class="ds-body">${e(p[s.key]).replace(/\n/g,'<br>')}</div>
    </div>`).join('');

  const linkBtns = links.length ? `
    <div class="card-links">
      ${links.map(url => {
        const pl = platform(url);
        return `<a class="link-btn" href="${e(url)}" target="_blank" rel="noopener">${pl.icon} ${pl.name}</a>`;
      }).join('')}
    </div>` : '';

  return `
    <div class="card${myV?' v-'+myV:''}" id="card-${key}">
      <div class="card-top">
        <div class="rank-num${i<3?' r'+(i+1):''}">${i+1}</div>
        <div class="card-name">${e(p.name)}</div>
        <div class="score-ring ${sc(p.score)}">${p.score}</div>
      </div>

      <div class="card-tags">
        <span class="tag t-cat">${e(p.category)}</span>
        <span class="tag t-src">${e(p.source)}</span>
        <span class="tag t-mg">毛利 ${e(p.margin)}</span>
      </div>

      ${p.highlight ? `<div class="card-hl">${e(p.highlight)}</div>` : ''}

      <div class="card-nums">
        <div class="cn"><div class="cn-label">建議售價</div><div class="cn-val">${e(p.price)}</div></div>
        <div class="cn"><div class="cn-label">毛利倍數</div><div class="cn-val g">${e(p.margin)}</div></div>
      </div>

      <div class="vote-row">
        <div class="vote-q">快速評價</div>
        <button class="vbtn${myV==='up'?' v-up':''}" id="vup-${key}" onclick="vote('${key}','up')">👍 值得</button>
        <button class="vbtn${myV==='down'?' v-down':''}" id="vdn-${key}" onclick="vote('${key}','down')">👎 跳過</button>
      </div>

      <button class="exp-btn" id="expbtn-${key}" onclick="toggleDet('${key}')">
        展開詳情 <span class="arr">▾</span>
      </button>

      <div class="det" id="det-${key}">
        <div class="det-inner">
          <div class="scores-head">
            <span class="scores-title">${dims.length} 維度評分</span>
            <span class="scores-note">原始分 0–100，括號為權重</span>
          </div>
          ${scoreBars}
          ${sections ? `<div class="ds-grid">${sections}</div>` : ''}
        </div>
        ${linkBtns}
      </div>
    </div>`;
}

// ──────────────────────────────────────────
//  ACTIONS
// ──────────────────────────────────────────
function switchDate(d) {
  G.date = d;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function jumpToProduct(date, rank) {
  // Switch to the correct date, then scroll + expand target card
  G.date = date;
  render();
  const key = `${date}-${rank}`;
  setTimeout(() => {
    const card = document.getElementById('card-' + key);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      // Auto-expand if not already open
      const det = document.getElementById('det-' + key);
      if (det && !det.classList.contains('open')) {
        setTimeout(() => toggleDet(key), 300);
      }
    }
  }, 80);
}

function toggleDet(key) {
  const det = document.getElementById('det-'+key);
  const btn = document.getElementById('expbtn-'+key);
  const open = det.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.innerHTML = (open ? '收起詳情' : '展開詳情') + ' <span class="arr">▾</span>';
}

function vote(key, type) {
  const prev = G.votes[key];
  const card = document.getElementById('card-'+key);
  const upBtn = document.getElementById('vup-'+key);
  const dnBtn = document.getElementById('vdn-'+key);

  // Toggle off if same
  if (prev === type) {
    delete G.votes[key];
    card?.classList.remove('v-up','v-down');
    upBtn?.classList.remove('v-up');
    dnBtn?.classList.remove('v-down');
    return;
  }

  G.votes[key] = type;
  card?.classList.remove('v-up','v-down');
  card?.classList.add('v-'+type);
  upBtn?.classList.toggle('v-up',   type==='up');
  upBtn?.classList.toggle('v-down', false);
  dnBtn?.classList.toggle('v-down', type==='down');
  dnBtn?.classList.toggle('v-up',   false);

  const p = G.pMap[key];
  if (p) {
    fetch(FEEDBACK_API, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        report_date:   G.date,
        product_name:  p.name,
        product_score: p.score,
        feedback:      type==='up' ? '👍' : '👎',
        reviewer:      'EE_member'
      })
    }).catch(() => {});
  }
  showToast(type === 'up' ? '👍 已記錄！' : '👎 已記錄！');
}

// ──────────────────────────────────────────
//  BOOT
// ──────────────────────────────────────────
fetch(DATA_URL + '?v=' + Date.now())
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => {
    G.data = data;
    G.date = data.reports[0]?.date || '';
    render();
  })
  .catch(err => {
    document.getElementById('app').innerHTML =
      `<div class="loading" style="color:#ef4444">
        ⚠️ 報告載入失敗，請重整頁面<br>
        <small style="font-size:11px;opacity:.6">${err.message}</small>
      </div>`;
  });
</script>
</body>
