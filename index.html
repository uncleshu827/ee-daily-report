<body>

<div class="header">
  <h1>脙掳脜赂芒聙聹脗娄 EE 脙娄脗炉脗聫脙娄芒聙聰脗楼脙漏脗聛脗赂脙楼芒聙聹脗聛脙楼脗聽脗卤脙楼芒聙聵脜聽</h1>
  <p class="subtitle" id="headerSub">脙篓脗录芒聙掳脙楼芒聙娄脗楼脙陇脗赂脗颅脙垄芒聜卢脗娄</p>
  <div class="stats-bar" id="statsBar"></div>
</div>

<div class="date-nav-wrap">
  <div class="date-nav" id="dateNav"></div>
</div>

<div class="main">
  <div id="content">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div>脙篓脗录芒聙掳脙楼芒聙娄脗楼脙漏脗聛脗赂脙楼芒聙聹脗聛脙楼脗聽脗卤脙楼芒聙聵脜聽脙陇脗赂脗颅脙垄芒聜卢脗娄</div>
    </div>
  </div>

  <div class="top10-section" id="top10Section" style="display:none">
    <div class="top10-title">脙掳脜赂脗聫芒聙聽 脙娄脗颅脗路脙楼脗聫脗虏 Top 10</div>
    <div id="top10List"></div>
  </div>
</div>

<script>
const DATA_URL = 'data.json';
const SCORE_LABELS = {
  margin: '脙娄脗炉芒聙潞脙楼脣聠脗漏脙搂脗漏脗潞脙漏芒聙聯芒聙聹', demand: '脙漏脜聯芒聜卢脙娄脗卤芒聙職脙漏脗漏芒聙聰脙篓脗颅芒聙掳',
  barrier: '脙搂脗芦脗露脙搂脣聠脗颅脙楼脗拢脗聛脙楼脗拢脣聹', viral: '脙搂芒聙聰芒聙娄脙娄脗炉芒聙聶脙楼芒聙職脗鲁脙娄芒聙聶脗颅',
  difficulty: '脙娄芒聙聹脗聧脙陇脗陆脜聯脙漏芒聙潞脗拢脙楼脗潞脗娄', repurchase: '脙楼芒聙潞脜戮脙篓脗鲁脗录脙娄脗陆芒聙潞脙楼脜聽芒聙潞'
};
const SCORE_MAX = { margin:25, demand:25, barrier:15, viral:15, difficulty:10, repurchase:10 };
const SCORE_COLORS = { margin:'#6c47ff', demand:'#10b981', barrier:'#f59e0b', viral:'#ec4899', difficulty:'#06b6d4', repurchase:'#8b5cf6' };

let allData = null;
let currentDate = null;

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allData = await res.json();
    init();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="error-box">脙垄脜隆脗聽脙炉脗赂脗聫 脙篓脗鲁芒聙隆脙娄芒聙聯芒聞垄脙篓脗录芒聙掳脙楼芒聙娄脗楼脙楼脗陇脗卤脙娄芒聙垄芒聙聰脙炉脗录脜隆' + e.message + '<br>脙篓脗芦芒聙鹿脙搂脗篓脗聧脙楼脗戮脜聮脙漏芒聙隆脗聧脙娄芒聙垄脗麓脙漏脗聽脗聛脙漏脗聺脗垄</div>';
  }
}

function init() {
  if (!allData || !allData.reports || allData.reports.length === 0) {
    document.getElementById('content').innerHTML = '<div class="error-box">脙娄脜隆脗芦脙搂芒聙聻脗隆脙楼脗聽脗卤脙楼芒聙聵脜聽脙篓脗鲁芒聙隆脙娄芒聙聯芒聞垄</div>';
    return;
  }

  // Sort descending by date
  allData.reports.sort((a, b) => b.date.localeCompare(a.date));
  currentDate = allData.reports[0].date;

  renderStats();
  renderDateNav();
  renderReport(currentDate);
  renderTop10();
}

function renderStats() {
  const reports = allData.reports;
  const totalDays = reports.length;
  const totalProducts = reports.reduce((s, r) => s + (r.products?.length || 0), 0);
  const allScores = reports.flatMap(r => (r.products||[]).map(p => p.score)).filter(Boolean);
  const avgScore = allScores.length ? Math.round(allScores.reduce((a,b)=>a+b,0)/allScores.length) : '-';
  const maxScore = allScores.length ? Math.max(...allScores) : '-';

  document.getElementById('headerSub').textContent = '脙娄脜聯芒聜卢脙楼脗戮脜聮脙娄芒聙潞脗麓脙娄芒聙聯脗掳脙炉脗录脜隆' + (allData.lastUpdated || '-');
  document.getElementById('statsBar').innerHTML = [
    ['脙掳脜赂芒聙聹芒聙娄', totalDays + ' 脙楼脗陇脗漏'],
    ['脙掳脜赂芒聙聹脗娄', totalProducts + ' 脙搂芒聙聺脗垄脙楼芒聙聹脗聛'],
    ['脙垄脗颅脗聬', '脙楼脗聺芒聙隆脙楼脣聠芒聙聽 ' + avgScore],
    ['脙掳脜赂脗聫芒聙娄', '脙娄脜聯芒聜卢脙漏脗芦脣聹 ' + maxScore],
  ].map(([icon, val]) => `<div class="stat-pill">${icon} ${val}</div>`).join('');
}

function renderDateNav() {
  const nav = document.getElementById('dateNav');
  nav.innerHTML = allData.reports.map(r =>
    `<button class="date-btn${r.date === currentDate ? ' active' : ''}" onclick="switchDate('${r.date}')">${formatDate(r.date)}</button>`
  ).join('');
}

function switchDate(date) {
  currentDate = date;
  document.querySelectorAll('.date-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === formatDate(date));
  });
  renderReport(date);
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${m}/${day}`;
}

function renderReport(date) {
  const report = allData.reports.find(r => r.date === date);
  if (!report) return;

  const products = report.products || [];
  let html = '';

  if (report.evolution) {
    html += `<div class="evolution-box"><div class="evo-label">脙掳脜赂脗搂脗聽 $脗禄脜聽脙娄芒聙聰脗楼脙漏芒聜卢脗虏脙楼脜聮芒聙聯</div>${escHtml(report.evolution)}</div>`;
  }

  html += `<div class="day-label">脙掳脜赂芒聙聹脗娄 ${date} 脙搂脗虏脗戮脙漏脗聛脗赂脙搂芒聙聺脗垄脙楼芒聙聹脗聛脙炉脗录脣聠${products.length} $脗禄脗露脙炉脗录芒聙掳</div>`;

  products.forEach(p => {
    const scoreClass = p.score >= 85 ? 'score-hi' : p.score >= 70 ? 'score-mid' : 'score-lo';
    const rankClass = p.rank === 1 ? 'rank-1' : p.rank === 2 ? 'rank-2' : p.rank === 3 ? 'rank-3' : 'rank-other';
    const fbKey = `fb_${date}_${p.rank}`;
    const saved = localStorage.getItem(fbKey) || '';

    let scoreBarHtml = '';
    if (p.scores) {
      scoreBarHtml = `<div class="score-section">
        <div class="score-section-title">脙楼芒聙娄脗颅脙搂脗露脗颅脙楼脗潞脗娄脙篓脗漏芒聙垄脙楼脣聠芒聙聽</div>`;
      Object.entries(SCORE_LABELS).forEach(([k, label]) => {
        const val = p.scores[k] || 0;
        const max = SCORE_MAX[k];
        const pct = Math.round(val / max * 100);
        scoreBarHtml += `<div class="score-row">
          <div class="score-label">${label}</div>
          <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%;background:${SCORE_COLORS[k]}"></div></div>
          <div class="score-val">${val}</div>
        </div>`;
      });
      scoreBarHtml += '</div>';
    }

    const linksHtml = (p.links && p.links.length)
      ? `<div class="links-row">${p.links.map((l,i) => `<a class="link-btn" href="${escHtml(l)}" target="_blank" rel="noopener">脙楼脗聫脝聮脙篓芒聜卢脝聮脙漏芒聜卢脗拢脙搂脗碌脗聬 ${i+1}</a>`).join('')}</div>`
      : '';

    html += `<div class="product-card">
      <div class="card-header" onclick="toggleCard(this)">
        <div class="rank-badge ${rankClass}">${p.rank}</div>
        <div class="card-title-wrap">
          <div class="card-name">${escHtml(p.name || '')}</div>
          <div class="card-meta">
            ${p.category ? `<span class="tag tag-cat">${escHtml(p.category)}</span>` : ''}
            ${p.price ? `<span class="tag tag-price">${escHtml(p.price)}</span>` : ''}
            ${p.margin ? `<span class="tag tag-margin">脙娄脗炉芒聙潞脙楼脣聠脗漏 ${escHtml(p.margin)}</span>` : ''}
          </div>
        </div>
        <div class="score-circle ${scoreClass}">${p.score || '?'}</div>
        <div class="toggle-arrow">脙垄芒聙聯脗录</div>
      </div>
      <div class="card-body">
        ${p.highlight ? `<div class="highlight-text">脙掳脜赂芒聙聶脗隆 ${escHtml(p.highlight)}</div>` : ''}
        ${scoreBarHtml}
        <div class="info-grid">
          ${p.demand_validation ? `<div class="info-item"><div class="info-label">脙漏脜聯芒聜卢脙娄脗卤芒聙職脙漏脗漏芒聙聰脙篓脗颅芒聙掳</div><div class="info-val">${escHtml(p.demand_validation)}</div></div>` : ''}
          ${p.cost_breakdown ? `<div class="info-item"><div class="info-label">脙娄脣聠脗聬脙娄脜聯脗卢脙娄芒聙鹿芒聙聽脙篓脗搂脗拢</div><div class="info-val">${escHtml(p.cost_breakdown)}</div></div>` : ''}
        </div>
        ${linksHtml}
        <div class="feedback-row">
          <div class="feedback-label">脙漏芒聜卢芒聞垄脙楼芒聜卢芒聙鹿脙漏脗聛脗赂脙楼芒聙聹脗聛脙娄芒聜卢脜陆脙漏脗潞脗录脙娄脗篓脗拢脙炉脗录脜赂</div>
          <button class="fb-btn ${saved==='up'?'active-up':''}" onclick="feedback('${date}','${p.rank}','up',this)">脙掳脜赂芒聙聵脗聧 <span id="up_${date}_${p.rank}">${(p.upvotes||0)}</span></button>
          <button class="fb-btn ${saved==='down'?'active-down':''}" onclick="feedback('${date}','${p.rank}','down',this)">脙掳脜赂芒聙聵脜陆 <span id="dn_${date}_${p.rank}">${(p.downvotes||0)}</span></button>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function renderTop10() {
  const all = allData.reports.flatMap(r =>
    (r.products||[]).map(p => ({ ...p, date: r.date }))
  );
  all.sort((a,b) => (b.score||0) - (a.score||0));
  const top = all.slice(0, 10);
  if (!top.length) return;

  document.getElementById('top10List').innerHTML = top.map((p, i) =>
    `<div class="top10-row">
      <div class="top10-rank">${i+1}</div>
      <div class="top10-name">${escHtml(p.name||'')}</div>
      <div class="top10-date">${p.date}</div>
      <div class="top10-score">${p.score}</div>
    </div>`
  ).join('');
  document.getElementById('top10Section').style.display = 'block';
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.toggle-arrow');
  const isOpen = body.classList.toggle('open');
  arrow.classList.toggle('open', isOpen);
}

function feedback(date, rank, type, btn) {
  const key = `fb_${date}_${rank}`;
  const prev = localStorage.getItem(key);
  if (prev === type) return;
  localStorage.setItem(key, type);

  // Visual update
  const card = btn.closest('.feedback-row');
  card.querySelectorAll('.fb-btn').forEach(b => {
    b.classList.remove('active-up', 'active-down');
  });
  btn.classList.add(type === 'up' ? 'active-up' : 'active-down');

  // Send to Google Apps Script (non-blocking)
  const API = 'https://script.google.com/macros/s/AKfycbwZZj_KXEh3Q67nJwW_c5xmYdBVnVoxlSJLYtVfbHRwq0NKxKN9NtKH81pRkAL2Ffxb/exec';
  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      report_date: date,
      product_name: '',
      product_score: rank,
      feedback: type,
      reviewer: 'web'
    })
  }).catch(() => {});
}

function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

loadData();
</script>
