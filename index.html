<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EE жҜҸж—ҘйҒёе“Ғе ұе‘Ҡ</title>
<style>
  :root {
    --primary: #6c47ff;
    --primary-light: #ede8ff;
    --gold: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --bg: #f8f7ff;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e7eb;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* в”Җв”Җ Header в”Җв”Җ */
  .header {
    background: linear-gradient(135deg, #6c47ff 0%, #9b6dff 100%);
    color: white;
    padding: 24px 16px 20px;
    text-align: center;
  }
  .header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; }
  .header .subtitle { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }

  /* в”Җв”Җ Stats bar в”Җв”Җ */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 12px 16px 0;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.78rem;
    font-weight: 600;
  }

  /* в”Җв”Җ Date Nav в”Җв”Җ */
  .date-nav-wrap {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .date-nav-wrap::-webkit-scrollbar { display: none; }
  .date-nav {
    display: flex;
    gap: 4px;
    padding: 12px 0;
    width: max-content;
    min-width: 100%;
  }
  .date-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--muted);
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-weight: 500;
  }
  .date-btn:hover { border-color: var(--primary); color: var(--primary); }
  .date-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
    font-weight: 600;
  }

  /* в”Җв”Җ Main content в”Җв”Җ */
  .main { max-width: 720px; margin: 0 auto; padding: 16px; }

  /* в”Җв”Җ Evolution box в”Җв”Җ */
  .evolution-box {
    background: var(--primary-light);
    border-left: 4px solid var(--primary);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    line-height: 1.6;
    color: #4c3a9e;
  }
  .evolution-box .evo-label {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--primary);
    margin-bottom: 6px;
  }

  /* в”Җв”Җ Product card в”Җв”Җ */
  .product-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    transition: box-shadow 0.2s;
  }
  .product-card:hover { box-shadow: 0 4px 16px rgba(108,71,255,0.12); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px 10px;
    cursor: pointer;
  }
  .rank-badge {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.9rem;
    flex-shrink: 0;
  }
  .rank-1 { background: #fef3c7; color: #d97706; }
  .rank-2 { background: #f3f4f6; color: #6b7280; }
  .rank-3 { background: #fce7f3; color: #db2777; }
  .rank-other { background: var(--primary-light); color: var(--primary); }

  .card-title-wrap { flex: 1; min-width: 0; }
  .card-name { font-weight: 700; font-size: 1rem; line-height: 1.3; }
  .card-meta {
    display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap;
  }
  .tag {
    font-size: 0.72rem; padding: 2px 8px;
    border-radius: 10px; font-weight: 600;
  }
  .tag-cat { background: #ede8ff; color: var(--primary); }
  .tag-price { background: #ecfdf5; color: #059669; }
  .tag-margin { background: #fff7ed; color: #ea580c; }

  .score-circle {
    width: 44px; height: 44px; flex-shrink: 0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 1.05rem;
    border: 3px solid;
  }
  .score-hi { border-color: var(--green); color: var(--green); }
  .score-mid { border-color: var(--gold); color: var(--gold); }
  .score-lo { border-color: var(--red); color: var(--red); }

  /* в”Җв”Җ Expand toggle arrow в”Җв”Җ */
  .toggle-arrow {
    color: var(--muted); font-size: 0.8rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .card-body { display: none; padding: 0 16px 16px; }
  .card-body.open { display: block; }
  .toggle-arrow.open { transform: rotate(180deg); }

  /* в”Җв”Җ Highlight в”Җв”Җ */
  .highlight-text {
    font-size: 0.85rem; color: var(--muted);
    margin-bottom: 12px; line-height: 1.5;
    padding-top: 2px;
  }

  /* в”Җв”Җ Score bars в”Җв”Җ */
  .score-section { margin-bottom: 12px; }
  .score-section-title {
    font-size: 0.72rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--muted); margin-bottom: 8px;
  }
  .score-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px;
  }
  .score-label { font-size: 0.78rem; width: 80px; flex-shrink: 0; color: var(--text); }
  .score-bar-wrap { flex: 1; background: #f3f4f6; border-radius: 4px; height: 8px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .score-val { font-size: 0.78rem; font-weight: 600; width: 28px; text-align: right; color: var(--text); }

  /* в”Җв”Җ Info grid в”Җв”Җ */
  .info-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 12px;
  }
  .info-item {
    background: #f9fafb; border-radius: 10px; padding: 10px 12px;
  }
  .info-item .info-label {
    font-size: 0.7rem; color: var(--muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .info-item .info-val {
    font-size: 0.85rem; font-weight: 600; color: var(--text);
    margin-top: 2px; line-height: 1.4;
  }

  /* в”Җв”Җ Links в”Җв”Җ */
  .links-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .link-btn {
    font-size: 0.78rem; padding: 5px 12px;
    border-radius: 8px; border: 1.5px solid var(--primary);
    color: var(--primary); text-decoration: none;
    font-weight: 600; transition: all 0.15s;
  }
  .link-btn:hover { background: var(--primary); color: white; }

  /* в”Җв”Җ Feedback в”Җв”Җ */
  .feedback-row {
    display: flex; align-items: center; gap: 12px;
    padding-top: 10px; border-top: 1px solid var(--border);
  }
  .feedback-label { font-size: 0.78rem; color: var(--muted); flex: 1; }
  .fb-btn {
    padding: 6px 14px; border-radius: 10px; border: 1.5px solid var(--border);
    background: white; cursor: pointer; font-size: 0.85rem;
    transition: all 0.15s; display: flex; align-items: center; gap: 4px;
  }
  .fb-btn.active-up { background: #ecfdf5; border-color: var(--green); }
  .fb-btn.active-down { background: #fef2f2; border-color: var(--red); }

  /* в”Җв”Җ Top 10 в”Җв”Җ */
  .top10-section {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px; margin-bottom: 20px;
  }
  .top10-title {
    font-size: 0.9rem; font-weight: 700; margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .top10-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
  }
  .top10-row:last-child { border-bottom: none; }
  .top10-rank { font-weight: 800; width: 20px; color: var(--primary); }
  .top10-name { flex: 1; font-weight: 600; }
  .top10-date { color: var(--muted); font-size: 0.75rem; }
  .top10-score { font-weight: 700; color: var(--primary); }

  /* в”Җв”Җ Loading / Error в”Җв”Җ */
  .loading-wrap {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: #fef2f2; border: 1px solid #fecaca;
    border-radius: 12px; padding: 16px; color: #b91c1c;
    font-size: 0.85rem; text-align: center;
  }

  /* в”Җв”Җ Section label в”Җв”Җ */
  .day-label {
    font-size: 0.8rem; font-weight: 700; color: var(--muted);
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .day-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* в”Җв”Җ Mobile tweaks в”Җв”Җ */
  @media (max-width: 480px) {
    .info-grid { grid-template-columns: 1fr; }
    .card-name { font-size: 0.95rem; }
    .score-label { width: 70px; font-size: 0.75rem; }
    .header h1 { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>рҹ“Ұ EE жҜҸж—ҘйҒёе“Ғе ұе‘Ҡ</h1>
  <p class="subtitle" id="headerSub">ијүе…ҘдёӯвҖҰ</p>
  <div class="stats-bar" id="statsBar"></div>
</div>

<div class="date-nav-wrap">
  <div class="date-nav" id="dateNav"></div>
</div>

<div class="main">
  <div id="content">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div>ијүе…ҘйҒёе“Ғе ұе‘ҠдёӯвҖҰ</div>
    </div>
  </div>

  <div class="top10-section" id="top10Section" style="display:none">
    <div class="top10-title">рҹҸҶ жӯ·еҸІ Top 10</div>
    <div id="top10List"></div>
  </div>
</div>

<script>
const DATA_URL = 'data.json';
const SCORE_LABELS = {
  margin: 'жҜӣеҲ©з©әй–“', demand: 'йңҖжұӮй©—иӯү',
  barrier: 'з«¶зҲӯеЈҒеЈҳ', viral: 'з—…жҜ’еӮіж’ӯ',
  difficulty: 'ж“ҚдҪңйӣЈеәҰ', repurchase: 'еӣһиіјжҪӣеҠӣ'
};
const SCORE_MAX = { margin:25, demand:25, barrier:15, viral:15, difficulty:10, repurchase:10 };
const SCORE_COLORS = { margin:'#6c47ff', demand:'#10b981', barrier:'#f59e0b', viral:'#ec4899', difficulty:'#06b6d4', repurchase:'#8b5cf6' };

let allData = null;
let currentDate = null;

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allData = await res.json();
    init();
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="error-box">вҡ пёҸ иіҮж–ҷијүе…ҘеӨұж•—пјҡ' + e.message + '<br>и«ӢзЁҚеҫҢйҮҚж•ҙй Ғйқў</div>';
  }
}

function init() {
  if (!allData || !allData.reports || allData.reports.length === 0) {
    document.getElementById('content').innerHTML = '<div class="error-box">жҡ«з„Ўе ұе‘ҠиіҮж–ҷ</div>';
    return;
  }

  // Sort descending by date
  allData.reports.sort((a, b) => b.date.localeCompare(a.date));
  currentDate = allData.reports[0].date;

  renderStats();
  renderDateNav();
  renderReport(currentDate);
  renderTop10();
}

function renderStats() {
  const reports = allData.reports;
  const totalDays = reports.length;
  const totalProducts = reports.reduce((s, r) => s + (r.products?.length || 0), 0);
  const allScores = reports.flatMar(r => (r.products||[]).map(p => p.score)).filter(Boolean);
  const avgScore = allScores.length ? Math.round(allScores.reduce((a,b)=>a+b,0)/allScores.length) : '-';
  const maxScore = allScores.length ? Math.max(...allScores) : '-';

  document.getElementById('headerSub').textContent = 'жңҖеҫҢжӣҙж–°пјҡ' + (allData.lastUpdated || '-');
  document.getElementById('statsBar').innerHTML = [
    ['рҹ“…', totalDays + ' еӨ©'],
    ['рҹ“Ұ', totalProducts + ' з”ўе“Ғ'],
    ['вӯҗ', 'еқҮеҲҶ ' + avgScore],
    ['рҹҸ…', 'жңҖй«ҳ ' + maxScore],
  ].map(([icon, val]) => `<div class="stat-pill">${icon} ${val}</div>`).join('');
}

function renderDateNav() {
  const nav = document.getElementById('dateNav');
  nav.innerHTML = allData.reports.map(r =>
    `<button class="date-btn${r.date === currentDate ? ' active' : ''}" onclick="switchDate('${r.date}')">${formatDate(r.date)}</button>`
  ).join('');
}

function switchDate(date) {
  currentDate = date;
  document.querySelectorAll('.date-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === formatDate(date));
  });
  renderReport(date);
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${m}/${day}`;
}

function renderReport(date) {
  const report = allData.reports.find(r => r.date === date);
  if (!report) return;

  const products = report.products || [];
  let html = '';

  if (report.evolution) {
    html += `<div class="evolution-box"><div class="evo-label">рҹ§  $»Ҡж—ҘйҖІеҢ–</div>${escHtml(report.evolution)}</div>`;
  }

  html += `<div class="day-label">рҹ“Ұ ${date} зІҫйҒёз”ўе“ҒпјҲ${products.length} $»¶пјү</div>`;

  products.forEach(p => {
    const scoreClass = p.score >= 85 ? 'score-hi' : p.score >= 70 ? 'score-mid' : 'score-lo';
    const rankClass = p.rank === 1 ? 'rank-1' : p.rank === 2 ? 'rank-2' : p.rank === 3 ? 'rank-3' : 'rank-other';
    const fbKey = `fb_${date}_${p.rank}`;
    const saved = localStorage.getItem(fbKey) || '';

    let scoreBarHtml = '';
    if (p.scores) {
      scoreBarHtml = `<div class="score-section">
        <div class="score-section-title">е…ӯз¶ӯеәҰи©•еҲҶ</div>`;
      Object.entries(SCORE_LABELS).forEach(([k, label]) => {
        const val = p.scores[k] || 0;
        const max = SCORE_MAX[k];
        const pct = Math.round(val / max * 100);
        scoreBarHtml += `<div class="score-row">
          <div class="score-label">${label}</div>
          <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%;background:${SCORE_COLORS[k]}"></div></div>
          <div class="score-val">${val}</div>
        </div>`;
      });
      scoreBarHtml += '</div>';
    }

    const linksHtml = (p.links && p.links.length)
      ? `<div class="links-row">${p.links.map((l,i) => `<a class="link-btn" href="${escHtml(l)}" target="_blank" rel="noopener">еҸғиҖғйҖЈзөҗ ${i+1}</a>`).join('')}</div>`
      : '';

    html += `<div class="product-card">
      <div class="card-header" onclick="toggleCard(this)">
        <div class="rank-badge ${rankClass}">${p.rank}</div>
        <div class="card-title-wrap">
          <div class="card-name">${escHtml(p.name || '')}</div>
          <div class="card-meta">
            ${p.category ? `<span class="tag tag-cat">${escHtml(p.category)}</span>` : ''}
            ${p.price ? `<span class="tag tag-price">${escHtml(p.price)}</span>` : ''}
            ${p.margin ? `<span class="tag tag-margin">жҜӣеҲ© ${escHtml(p.margin)}</span>` : ''}
          </div>
        </div>
        <div class="score-circle ${scoreClass}">${p.score || '?'}</div>
        <div class="toggle-arrow">в–ј</div>
      </div>
      <div class="card-body">
        ${p.highlight ? `<div class="highlight-text">рҹ’Ў ${escHtml(p.highlight)}</div>` : ''}
        ${scoreBarHtml}
        <div class="info-grid">
          ${p.demand_validation ? `<div class="info-item"><div class="info-label">йңҖжұӮй©—иӯү</div><div class="info-val">${escHtml(p.demand_validation)}</div></div>` : ''}
          ${p.cost_breakdown ? `<div class="info-item"><div class="info-label">жҲҗжң¬жӢҶи§Ј</div><div class="info-val">${escHtml(p.cost_breakdown)}</div></div>` : ''}
        </div>
        ${linksHtml}
        <div class="feedback-row">
          <div class="feedback-label">йҖҷеҖӢйҒёе“ҒжҖҺйәјжЁЈпјҹ</div>
          <button class="fb-btn ${saved==='up'?'active-up':''}" onclick="feedback('${date}','${p.rank}','up',this)">рҹ‘Қ <span id="up_${date}_${p.rank}">${(p.upvotes||0)}</span></button>
          <button class="fb-btn ${saved==='down'?'active-down':''}" onclick="feedback('${date}','${p.rank}','down',this)">рҹ‘Һ <span id="dn_${date}_${p.rank}">${(p.downvotes||0)}</span></button>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function renderTop10() {
  const all = allData.reports.flatMap(r =>
    (r.products||[]).map(p => ({ ...p, date: r.date }))
  );
  all.sort((a,b) => (b.score||0) - (a.score||0));
  const top = all.slice(0, 10);
  if (!top.length) return;

  document.getElementById('top10List').innerHTML = top.map((p, i) =>
    `<div class="top10-row">
      <div class="top10-rank">${i+1}</div>
      <div class="top10-name">${escHtml(p.name||'')}</div>
      <div class="top10-date">${p.date}</div>
      <div class="top10-score">${p.score}</div>
    </div>`
  ).join('');
  document.getElementById('top10Section').style.display = 'block';
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.toggle-arrow');
  const isOpen = body.classList.toggle('open');
  arrow.classList.toggle('open', isOpen);
}

function feedback(date, rank, type, btn) {
  const key = `fb_${date}_${rank}`;
  const prev = localStorage.getItem(key);
  if (prev === type) return;
  localStorage.setItem(key, type);

  // Visual update
  const card = btn.closest('.feedback-row');
  card.querySelectorAll('.fb-btn').forEach(b => {
    b.classList.remove('active-up', 'active-down');
  });
  btn.classList.add(type === 'up' ? 'active-up' : 'active-down');

  // Send to Google Apps Script (non-blocking)
  const API = 'https://script.google.com/macros/s/AKfycbwZZj_KXEh3Q67nJwW_c5xmYdBVnVoxlSJLYtVfbHRwq0NKxKN9NtKH81pRkAL2Ffxb/exec';
  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      report_date: date,
      product_name: '',
      product_score: rank,
      feedback: type,
      reviewer: 'web'
    })
  }).catch(() => {});
}

function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

loadData();
</script>
</body>
</html>
