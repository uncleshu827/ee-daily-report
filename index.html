<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EE 選品研究站</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #252840;
    --border: #2e3250;
    --text: #e8eaf6;
    --text-muted: #8891b0;
    --accent: #7c6af7;
    --accent2: #4ecdc4;
    --green: #4ade80;
    --orange: #fb923c;
    --red: #f87171;
    --gold: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a1d2e, #252840);
    padding: 20px 16px 14px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(8px);
  }
  .header h1 { font-size: 1.3rem; color: var(--accent); letter-spacing: 0.05em; }
  .header p { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
  .stats-bar {
    display: flex; gap: 10px; overflow-x: auto;
    padding: 12px 16px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .stats-bar::-webkit-scrollbar { display: none; }
  .stat {
    flex-shrink: 0; text-align: center;
    padding: 8px 16px; background: var(--surface2);
    border-radius: 10px; border: 1px solid var(--border);
  }
  .stat-val { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }
  .date-nav {
    display: flex; gap: 8px; overflow-x: auto;
    padding: 10px 16px; background: var(--bg);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .date-nav::-webkit-scrollbar { display: none; }
  .date-btn {
    flex-shrink: 0; padding: 6px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text-muted);
    font-size: 0.8rem; cursor: pointer;
    transition: all 0.2s;
  }
  .date-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: white; font-weight: 600;
  }
  .date-btn:hover:not(.active) {
    border-color: var(--accent); color: var(--text);
  }
  .content { padding: 16px; max-width: 720px; margin: 0 auto; }
  .evolution-note {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    border-radius: 10px; padding: 12px 14px;
    margin-bottom: 16px; font-size: 0.82rem;
    color: var(--text-muted); line-height: 1.6;
  }
  .evolution-note strong { color: var(--accent2); }
  .product-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; margin-bottom: 14px;
    overflow: hidden; transition: border-color 0.2s;
  }
  .product-card:hover { border-color: var(--accent); }
  .card-header {
    padding: 14px; cursor: pointer;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .rank-badge {
    flex-shrink: 0; width: 32px; height: 32px;
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-weight: 700; font-size: 0.85rem;
    background: var(--surface2); color: var(--text-muted);
    border: 2px solid var(--border);
  }
  .rank-badge.rank-1 { background: rgba(251,191,36,0.15); border-color: var(--gold); color: var(--gold); }
  .rank-badge.rank-2 { background: rgba(148,163,184,0.15); border-color: #94a3b8; color: #94a3b8; }
  .rank-badge.rank-3 { background: rgba(180,120,80,0.15); border-color: #b47850; color: #b47850; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 0.72rem; color: var(--text-muted); }
  .tag {
    padding: 2px 8px; border-radius: 10px;
    background: var(--surface2); border: 1px solid var(--border);
  }
  .tag.category { color: var(--accent2); border-color: rgba(78,205,196,0.3); }
  .tag.margin-good { color: var(--green); border-color: rgba(74,222,128,0.3); }
  .tag.margin-ok { color: var(--orange); border-color: rgba(251,146,60,0.3); }
  .score-ring {
    flex-shrink: 0; width: 52px; height: 52px; position: relative;
  }
  .score-ring svg { width: 52px; height: 52px; transform: rotate(-90deg); }
  .score-ring .track { fill: none; stroke: var(--surface2); stroke-width: 4; }
  .score-ring .fill { fill: none; stroke-width: 4; stroke-linecap: round; }
  .score-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.85rem; font-weight: 700;
  }
  .expand-btn {
    width: 100%; padding: 8px; background: transparent;
    border: none; border-top: 1px solid var(--border);
    color: var(--text-muted); font-size: 0.75rem; cursor: pointer;
    transition: color 0.2s;
  }
  .expand-btn:hover { color: var(--text); }
  .card-detail { padding: 0 14px; display: none; }
  .card-detail.open { display: block; padding-top: 4px; }
  .detail-section { margin-bottom: 14px; }
  .detail-label {
    font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 5px;
  }
  .detail-content { font-size: 0.82rem; line-height: 1.7; color: var(--text); }
  .scores-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 6px; margin-bottom: 14px;
  }
  .score-item { background: var(--surface2); border-radius: 8px; padding: 8px; text-align: center; }
  .score-item-val { font-size: 1rem; font-weight: 700; color: var(--accent); }
  .score-item-label { font-size: 0.62rem; color: var(--text-muted); margin-top: 2px; }
  .links-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .link-btn {
    padding: 4px 10px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--accent); font-size: 0.75rem; text-decoration: none;
    transition: border-color 0.2s;
  }
  .link-btn:hover { border-color: var(--accent); }
  .card-actions {
    display: flex; gap: 8px; padding: 12px 14px;
    border-top: 1px solid var(--border);
  }
  .rating-btn {
    flex: 1; padding: 8px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-muted); font-size: 0.82rem; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center;
    justify-content: center; gap: 4px;
  }
  .rating-btn.liked { background: rgba(74,222,128,0.12); border-color: var(--green); color: var(--green); font-weight: 600; }
  .rating-btn.disliked { background: rgba(248,113,113,0.12); border-color: var(--red); color: var(--red); font-weight: 600; }
  .rating-btn:hover:not(.liked):not(.disliked) { border-color: var(--accent); color: var(--text); }
  .all-time { margin-top: 28px; margin-bottom: 32px; }
  .section-title {
    font-size: 0.9rem; font-weight: 600; color: var(--text-muted);
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .mini-card {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px;
  }
  .mini-card-date { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
  .mini-card-name { font-size: 0.85rem; font-weight: 500; }
  .mini-score {
    flex-shrink: 0; padding: 3px 10px; border-radius: 12px;
    font-size: 0.8rem; font-weight: 700;
  }
  .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 0.9rem; }
  .error { color: var(--red); text-align: center; padding: 40px 20px; line-height: 1.6; }
  .card-highlight {
    margin-top: 6px; font-size: 0.8rem; color: var(--text-muted); line-height: 1.5;
  }
  @media (max-width: 600px) {
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      overflow-x: unset;
    }
    .stat { flex-shrink: unset; }
    .scores-grid { grid-template-columns: repeat(2, 1fr); }
    .card-name { font-size: 0.95rem; }
    .score-ring { width: 46px; height: 46px; }
    .score-ring svg { width: 46px; height: 46px; }
    .score-text { font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🦞 EE 選品研究站</h1>
  <p id="header-sub">載入中…</p>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-val" id="total-days">—</div><div class="stat-label">天紀錄</div></div>
  <div class="stat"><div class="stat-val" id="total-products">—</div><div class="stat-label">個產品</div></div>
  <div class="stat"><div class="stat-val" id="avg-score">—</div><div class="stat-label">平均分</div></div>
  <div class="stat"><div class="stat-val" id="top-score">—</div><div class="stat-label">歷史最高</div></div>
</div>

<div class="date-nav" id="date-nav"></div>

<div class="content" id="content">
  <div class="loading">🔄 載入報告中…</div>
</div>

<script>
const FEEDBACK_API = 'https://script.google.com/macros/s/AKfycbwZZj_KXEh3Q67nJwW_c5xmYdBVnVoxlSJLYtVfbHRwq0NKxKN9NtKH81pRkAL2Ffxb/exec';
let allData = null;
let currentDate = null;

function getScoreColor(score) {
  if (score >= 80) return '#4ade80';
  if (score >= 65) return '#fbbf24';
  return '#fb923c';
}

function scoreCircle(score) {
  const r = 20, c = 26, circ = 2 * Math.PI * r;
  const offset = circ - (score / 100) * circ;
  const col = getScoreColor(score);
  return `<div class="score-ring">
    <svg viewBox="0 0 52 52">
      <circle class="track" cx="${c}" cy="${c}" r="${r}"/>
      <circle class="fill" cx="${c}" cy="${c}" r="${r}"
        stroke="${col}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
    </svg>
    <div class="score-text" style="color:${col}">${score}</div>
  </div>`;
}

function getRatingKey(date, productName) {
  return 'ee_rating_' + date + '_' + productName.replace(/\s+/g, '_');
}

function renderProduct(p, date, idx) {
  const rankClass = idx < 3 ? 'rank-' + (idx + 1) : '';
  const marginNum = parseFloat((p.margin || '0').replace('x', ''));
  const marginClass = marginNum >= 3.5 ? 'margin-good' : 'margin-ok';
  const ratingKey = getRatingKey(date, p.name);
  const rating = localStorage.getItem(ratingKey);

  const scoresHtml = p.scores ? `<div class="scores-grid">
    <div class="score-item"><div class="score-item-val">${p.scores.margin != null ? p.scores.margin : '—'}</div><div class="score-item-label">毛利 25%</div></div>
    <div class="score-item"><div class="score-item-val">${p.scores.demand != null ? p.scores.demand : '—'}</div><div class="score-item-label">需求驗證 25%</div></div>
    <div class="score-item"><div class="score-item-val">${p.scores.barrier != null ? p.scores.barrier : '—'}</div><div class="score-item-label">競爭壁壘 15%</div></div>
    <div class="score-item"><div class="score-item-val">${p.scores.viral != null ? p.scores.viral : '—'}</div><div class="score-item-label">傳播力 15%</div></div>
    <div class="score-item"><div class="score-item-val">${p.scores.difficulty != null ? p.scores.difficulty : '—'}</div><div class="score-item-label">操作難度 10%</div></div>
    <div class="score-item"><div class="score-item-val">${p.scores.repurchase != null ? p.scores.repurchase : '—'}</div><div class="score-item-label">複購潛力 10%</div></div>
  </div>` : '';

  const linksHtml = p.links && (Array.isArray(p.links) ? p.links.length : Object.keys(p.links).length) > 0 ? `<div class="detail-section">\n    <div class="detail-label">參考連結</div>\n    <div class="links-list">${Array.isArray(p.links) ? p.links.map((l, i) => `<a href="${l}" target="_blank" class="link-btn">🔗 連結${i + 1}</a>`).join('') : Object.entries(p.links).map(([k, v]) => `<a href="${v}" target="_blank" class="link-btn">🔗 ${k}</a>`).join('')}</div>\n  </div>` : '';

  const safeName = p.name.replace(/'/g, "\\'");

  return `<div class="product-card" id="card-${date}-${idx}">
  <div class="card-header" onclick="toggleCard('${date}',${idx})">
    <div class="rank-badge ${rankClass}">${idx + 1}</div>
    <div class="card-info">
      <div class="card-name">${p.name}</div>
      <div class="card-meta">
        <span class="tag category">${p.category || '—'}</span>
        <span class="tag">${p.price || '—'}</span>
        <span class="tag ${marginClass}">毛利 ${p.margin || '—'}</span>
      </div>
      <div class="card-highlight">${p.highlight || ''}</div>
    </div>
    ${scoreCircle(p.score)}
  </div>
  <button class="expand-btn" onclick="toggleCard('${date}',${idx})" id="expand-btn-${date}-${idx}">展開詳情 ▼</button>
  <div class="card-detail" id="detail-${date}-${idx}">
    ${scoresHtml}
    ${p.details ? Object.entries(p.details).map(([t,b]) => `<div class="detail-section"><div class="detail-label">${t}</div><div class="detail-content">${b.replace(/\n/g,'<br>')}</div></div>`).join('') : `${p.demand_validation ? `<div class="detail-section"><div class="detail-label">需求驗證</div><div class="detail-content">${p.demand_validation}</div></div>` : ''}${p.cost_breakdown ? `<div class="detail-section"><div class="detail-label">成本分析</div><div class="detail-content">${p.cost_breakdown}</div></div>` : ''}`}}
    ${linksHtml}
  </div>
  <div class="card-actions">
    <button class="rating-btn ${rating === 'like' ? 'liked' : ''}" id="like-${date}-${idx}" onclick="rate('${date}',${idx},'${safeName}','like')">👍 看好</button>
    <button class="rating-btn ${rating === 'dislike' ? 'disliked' : ''}" id="dislike-${date}-${idx}" onclick="rate('${date}',${idx},'${safeName}','dislike')">👎 觀望</button>
  </div>
</div>`;
}

function toggleCard(date, idx) {
  const detail = document.getElementById('detail-' + date + '-' + idx);
  const btn = document.getElementById('expand-btn-' + date + '-' + idx);
  const open = detail.classList.toggle('open');
  btn.textContent = open ? '收起 ▲' : '展開詳情 ▼';
}

function rate(date, idx, name, val) {
  const ratingKey = getRatingKey(date, name);
  if (localStorage.getItem(ratingKey) === val) return;
  localStorage.setItem(ratingKey, val);
  document.getElementById('like-' + date + '-' + idx).className = 'rating-btn' + (val === 'like' ? ' liked' : '');
  document.getElementById('dislike-' + date + '-' + idx).className = 'rating-btn' + (val === 'dislike' ? ' disliked' : '');
  const report = allData.reports.find(r => r.date === date);
  const score = report && report.products[idx] ? report.products[idx].score : 0;
  fetch(FEEDBACK_API, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ report_date: date, product_name: name, product_score: score, feedback: val === 'like' ? '看好' : '觀望', reviewer: 'EE Team' })
  }).catch(() => {});
}

function selectDate(date) {
  currentDate = date;
  document.querySelectorAll('.date-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.date === date);
  });
  const report = allData.reports.find(r => r.date === date);
  if (!report) return;

  let html = '';
  if (report.evolution) {
    html += `<div class="evolution-note"><strong>🧠 今日進化</strong>　${report.evolution}</div>`;
  }
  (report.products || []).forEach((p, i) => { html += renderProduct(p, date, i); });

  // All-time top 10
  const allProducts = allData.reports
    .flatMap(r => (r.products || []).map(p => ({ ...p, reportDate: r.date })))
    .sort((a, b) => b.score - a.score).slice(0, 10);

  if (allProducts.length > 0) {
    html += `<div class="all-time"><div class="section-title">🏆 歷史最高分 Top 10</div>
    ${allProducts.map(p => {
      const col = getScoreColor(p.score);
      const isToday = p.reportDate === date;
      return `<div class="mini-card">
        <div style="flex:1">
          <div class="mini-card-name">${p.name}${isToday ? ' <span style="font-size:0.65rem;color:var(--accent2);">今日</span>' : ''}</div>
          <div class="mini-card-date">${p.reportDate.slice(5).replace('-', '/')} ｜ ${p.category || ''}</div>
        </div>
        <div class="mini-score" style="background:${col}22;color:${col};border:1px solid ${col}44">${p.score}</div>
      </div>`;
    }).join('')}
    </div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function initApp(data) {
  allData = data;
  const reports = [...data.reports].sort((a, b) => b.date.localeCompare(a.date));
  const allProducts = reports.flatMap(r => r.products || []);
  const avgScore = allProducts.length ? Math.round(allProducts.reduce((s, p) => s + p.score, 0) / allProducts.length) : 0;
  const topScore = allProducts.length ? Math.max(...allProducts.map(p => p.score)) : 0;

  document.getElementById('total-days').textContent = reports.length;
  document.getElementById('total-products').textContent = allProducts.length;
  document.getElementById('avg-score').textContent = avgScore || '—';
  document.getElementById('top-score').textContent = topScore || '—';
  document.getElementById('header-sub').textContent = `最新：${reports[0] ? reports[0].date : '—'} ｜ 累積 ${allProducts.length} 個候選產品`;

  const nav = document.getElementById('date-nav');
  nav.innerHTML = reports.map(r => {
    const label = r.date.slice(5).replace('-', '/');
    return `<button class="date-btn" data-date="${r.date}" onclick="selectDate('${r.date}')">${label}</button>`;
  }).join('');

  if (reports.length) {
    selectDate(reports[0].date);
  } else {
    document.getElementById('content').innerHTML = `<div class="loading">📭 尚無報告資料，等待第一次排程執行</div>`;
  }
}

fetch('./data.json?t=' + Date.now())
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(initApp)
  .catch(err => {
    document.getElementById('content').innerHTML = `<div class="error">❌ 無法載入報告資料<br><small style="color:var(--text-muted)">${err.message}</small><br><br><small>請確認 data.json 已上傳至 repo</small></div>`;
  });
</script>
</body>
</html>
